<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — help</title>
  <meta name="theme-color" content="#22c55e" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #1f2937; }
    .card { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); border-radius: 24px; padding: 48px; text-align: center; max-width: 400px; margin: 24px; }
    .mark { width: 64px; height: 64px; background: #22c55e; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 32px; color: #fff; font-weight: 700; }
    h1 { font-size: 72px; font-weight: 700; color: #22c55e; line-height: 1; }
    p { font-size: 16px; color: #6b7280; margin: 16px 0 24px; }
    a { display: inline-block; background: #22c55e; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 12px; font-weight: 500; transition: background 0.2s; }
    a:hover { background: #16a34a; }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(135deg, #0f172a 0%, #0c1f17 50%, #0a1f13 100%); color: #f3f4f6; }
      .card { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.05); }
      p { color: #9ca3af; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">h</div>
    <h1>404</h1>
    <p>this page does not exist yet — maybe someone needs help finding it</p>
    <a href="/">go home</a>
  </div>
</body>
</html>
